<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italica 90 — Propuesta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #080808;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  /* Línea decorativa */
  .deco-line {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, rgba(237,216,189,0.35));
    margin: 0 auto 2.5rem;
  }

  /* Logo */
  .logo {
    font-size: clamp(2.8rem, 6vw, 5.5rem);
    font-weight: 800;
    letter-spacing: 0.14em;
    color: #ffffff;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 1rem;
  }

  /* Bajada */
  .bajada {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: #edd8bd;
    margin-bottom: 4rem;
  }

  /* Divisor */
  .divisor {
    width: 32px;
    height: 1px;
    background: rgba(237,216,189,0.2);
    margin: 0 auto 4rem;
  }

  /* Botones */
  .btns {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-camino {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.2rem;
    padding: 1.2rem 2rem;
    border: 1px solid rgba(237,216,189,0.3);
    text-decoration: none;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.4s, border-color 0.4s, transform 0.25s;
    min-width: 220px;
  }
  .btn-camino:hover {
    transform: translateY(-3px);
  }

  /* Camino 1 — Azzurro (#2F6E93) */
  .btn-camino-1:hover {
    background: #2F6E93;
    border-color: #2F6E93;
  }
  .btn-camino-1:hover .btn-num    { color: rgba(233,215,184,0.75); }
  .btn-camino-1:hover .btn-titulo { color: #fff; }
  .btn-camino-1:hover .btn-concepto { color: rgba(233,215,184,0.55); }

  /* Camino 2 — Terracotta (#B65A36) */
  .btn-camino-2:hover {
    background: #B65A36;
    border-color: #B65A36;
  }
  .btn-camino-2:hover .btn-num    { color: rgba(239,227,204,0.75); }
  .btn-camino-2:hover .btn-titulo { color: #fff; }
  .btn-camino-2:hover .btn-concepto { color: rgba(239,227,204,0.55); }

  .btn-num {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(237,216,189,0.55);
    transition: color 0.35s;
  }
  .btn-titulo {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #ffffff;
    line-height: 1;
  }
  .btn-concepto {
    font-size: 0.62rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(237,216,189,0.35);
    text-transform: uppercase;
    margin-top: 0.25rem;
    transition: color 0.35s;
  }

  /* Footer */
  .foot {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo     { animation: fadeUp 0.7s ease both; }
  .bajada   { animation: fadeUp 0.7s 0.12s ease both; }
  .divisor  { animation: fadeUp 0.7s 0.22s ease both; }
  .btns     { animation: fadeUp 0.7s 0.32s ease both; }

  /* Password gate */
  #gate {
    position: fixed; inset: 0;
    background: #080808;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 0;
  }
  #gate.hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .gate-logo {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }
  .gate-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    animation: fadeUp 0.6s 0.15s ease both;
  }
  .gate-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(237,216,189,0.3);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-align: center;
    padding: 0.6rem 1rem;
    width: 220px;
    outline: none;
    transition: border-color 0.3s;
  }
  .gate-input::placeholder { color: rgba(237,216,189,0.25); letter-spacing: 0.25em; font-size: 0.72rem; }
  .gate-input:focus { border-bottom-color: rgba(237,216,189,0.7); }
  .gate-error {
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #B65A36;
    opacity: 0;
    transition: opacity 0.3s;
    height: 1em;
  }
  .gate-error.visible { opacity: 1; }
  .gate-hint {
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(237,216,189,0.18);
    margin-top: 2rem;
    animation: fadeUp 0.6s 0.3s ease both;
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-form">
    <input id="gate-input" class="gate-input" type="password" placeholder="Contraseña" autocomplete="off" autofocus>
    <p id="gate-error" class="gate-error">Contraseña incorrecta</p>
  </div>
  <p class="gate-hint">Acceso restringido</p>
</div>

<div class="wrap">
  <div class="deco-line"></div>
  <h1 class="logo">Italica 90</h1>
  <p class="bajada">Moodboards de inspiración</p>
  <div class="divisor"></div>
  <div class="btns">
    <a href="Camino 1/bodegon_atlantico.html" class="btn-camino btn-camino-1">
      <span class="btn-num">Camino 01</span>
      <span class="btn-titulo">Costero</span>
      <span class="btn-concepto">Sole · Mare · Spritz</span>
    </a>
    <a href="Camino 2/bodegon_calido.html" class="btn-camino btn-camino-2">
      <span class="btn-num">Camino 02</span>
      <span class="btn-titulo">Bodegón</span>
      <span class="btn-concepto">Ladrillo · Fuego · Raíz</span>
    </a>
  </div>
</div>

<p class="foot">Propuesta de branding · 2026</p>

<script>
  const gate  = document.getElementById('gate');
  const input = document.getElementById('gate-input');
  const error = document.getElementById('gate-error');

  function unlock() {
    gate.classList.add('hidden');
    setTimeout(() => gate.remove(), 650);
  }

  if (sessionStorage.getItem('italica90_auth') === '1') {
    unlock();
  }

  input.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (input.value === 'Italica90') {
      sessionStorage.setItem('italica90_auth', '1');
      unlock();
    } else {
      error.classList.add('visible');
      input.value = '';
      setTimeout(() => error.classList.remove('visible'), 2000);
    }
  });
</script>
</body>
</html>
